name: Release Main Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build ${{ matrix.asset_label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            asset_label: macos-x86_64
          - runner: macos-14
            asset_label: macos-aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --quiet

      - name: Package release assets
        run: ./scripts/package-release.sh --label ${{ matrix.asset_label }} --release

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_label }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: Build windows-x86_64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --quiet

      - name: Package release assets
        shell: pwsh
        run: ./scripts/package-release-windows.ps1 -Label windows-x86_64

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          short_sha="${GITHUB_SHA::7}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=main-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: diske v${{ steps.meta.outputs.version }} main build ${{ steps.meta.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
